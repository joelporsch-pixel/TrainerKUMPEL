<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainerKUMPEL - SF Westenfeld</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; color: #0f172a; }
        .sfw-green { color: #006D34; }
        .sfw-bg { background-color: #006D34 !important; }
        .modal-anim { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        #loader-overlay {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { border: 4px solid #e2e8f0; border-top: 4px solid #006D34; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        input, select, textarea { 
            color: #0f172a !important; 
            font-weight: 700 !important; 
            background-color: #ffffff !important; 
            border: 2px solid #cbd5e1 !important;
            padding: 0.8rem !important;
            border-radius: 0.75rem !important;
        }
        .label-dark { color: #1e293b !important; font-weight: 800 !important; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.25rem; display: block; }
        .btn-primary { background-color: #006D34 !important; color: white !important; font-weight: 900 !important; }
        
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background: #006D34; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="loader-overlay"><div class="spinner"></div><p style="margin-top:20px; font-weight:900; color:#006D34;">SFW CLOUD LÄDT...</p></div>
    <div id="root"></div>

    <script type="text/babel">
        // Firebase Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyCyeBZWO12eswCR9lYFJR07cm4ljIrhkqY",
            authDomain: "trainerkumpel.firebaseapp.com",
            projectId: "trainerkumpel",
            storageBucket: "trainerkumpel.firebasestorage.app",
            messagingSenderId: "274423185184",
            appId: "1:274423185184:web:7a65942694ff8d98c5a145"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "sfw_master_v7_complete";

        const AGE_GROUPS = ['G-Jugend', 'F-Jugend', 'E-Jugend', 'D-Jugend', 'C-Jugend', 'B-Jugend', 'A-Jugend', 'Herren'];
        const PLAYER_COUNTS = ['1-4 Spieler', '5-8 Spieler', '9-12 Spieler', '13-17 Spieler', '18-22 Spieler'];
        const TRAINING_BLOCKS = ['A - Aufwärmen', 'I - Individuell', 'K - Kollektiv', 'LD - Letztes Drittel', 'S - Spiel'];
        const GAME_PHASES = ['Offensiv (Angreifen)', 'Defensiv (Verteidigen)'];
        const ADMIN_PASSWORD = 'SF_Westenfeld1965!';

        const Icon = ({ name, size = 18, className = "" }) => <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;

        function App() {
            // Explizite Definition der Hooks aus React
            const [exercises, setExercises] = React.useState([]);
            const [user, setUser] = React.useState(null);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [filters, setFilters] = React.useState({ age: 'Alle', players: 'Alle', block: 'Alle', phase: 'Alle' });
            const [selectedExercise, setSelectedExercise] = React.useState(null);
            const [isFormOpen, setIsFormOpen] = React.useState(false);
            const [isAuthenticated, setIsAuthenticated] = React.useState(false);
            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [passwordInput, setPasswordInput] = React.useState('');
            const [pendingAction, setPendingAction] = React.useState(null);
            const [isSaving, setIsSaving] = React.useState(false);
            
            const [formState, setFormState] = React.useState({ 
                title: '', trainingBlock: TRAINING_BLOCKS[0], gamePhase: GAME_PHASES[0], 
                ageGroup: [], players: PLAYER_COUNTS[0], duration: '', 
                fieldSizeTiefe: '', fieldSizeBreite: '', description: '', 
                procedure: '', coachingPoints: '', easier: '', harder: '', 
                mediaUrl: '', mediaType: 'image', videoLink: '' 
            });

            React.useEffect(() => {
                auth.signInAnonymously();
                auth.onAuthStateChanged(setUser);
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exercises')
                    .onSnapshot(snap => {
                        setExercises(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                        const loader = document.getElementById('loader-overlay');
                        if(loader) loader.style.display = 'none';
                    });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const checkAuth = (action, data = null) => {
                if (isAuthenticated) {
                    if (action === 'ADD') setIsFormOpen(true);
                    if (action === 'PDF') performExport(data);
                    if (action === 'DELETE') handleDelete(data);
                } else {
                    setPendingAction({ type: action, data });
                    setShowAuthModal(true);
                }
            };

            const handleAuth = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAuthenticated(true);
                    setShowAuthModal(false);
                    if (pendingAction.type === 'ADD') setIsFormOpen(true);
                    if (pendingAction.type === 'PDF') performExport(pendingAction.data);
                    if (pendingAction.type === 'DELETE') handleDelete(pendingAction.data);
                    setPasswordInput('');
                } else { 
                    alert("Falsches Passwort!"); 
                    setPasswordInput('');
                }
            };

            const handleDelete = async (ex) => {
                if (confirm(`Soll "${ex.title}" wirklich unwiderruflich gelöscht werden?`)) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exercises').doc(ex.id).delete();
                        setSelectedExercise(null);
                    } catch(e) {
                        alert("Löschvorgang fehlgeschlagen.");
                    }
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 800 * 1024) return alert("Datei zu groß (Max 800KB)");
                const reader = new FileReader();
                reader.onloadend = () => setFormState(p => ({ 
                    ...p, 
                    mediaUrl: reader.result, 
                    mediaType: file.type.startsWith('video/') ? 'video' : 'image' 
                }));
                reader.readAsDataURL(file);
            };

            const saveExercise = async (e) => {
                e.preventDefault();
                if (formState.ageGroup.length === 0) return alert("Bitte mindestens eine Altersklasse wählen!");
                if (!formState.mediaUrl) return alert("Bitte ein Bild oder Video hochladen!");
                
                setIsSaving(true);
                try {
                    const data = { ...formState, createdAt: Date.now() };
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exercises').add(data);
                    setIsSaving(false);
                    setIsFormOpen(false);
                    // Reset Form
                    setFormState({ title: '', trainingBlock: TRAINING_BLOCKS[0], gamePhase: GAME_PHASES[0], ageGroup: [], players: PLAYER_COUNTS[0], duration: '', fieldSizeTiefe: '', fieldSizeBreite: '', description: '', procedure: '', coachingPoints: '', easier: '', harder: '', mediaUrl: '', mediaType: 'image', videoLink: '' });
                } catch(e) {
                    alert("Speichern fehlgeschlagen.");
                    setIsSaving(false);
                }
            };

            const performExport = (ex) => {
                const win = window.open('', '', 'width=900,height=1000');
                win.document.write(`
                    <html>
                        <head>
                            <title>SFW Export - ${ex.title}</title>
                            <style>
                                body { font-family: sans-serif; padding: 40px; color: #1e293b; line-height: 1.5; }
                                h1 { color: #006D34; border-bottom: 4px solid #006D34; text-transform: uppercase; margin-bottom: 10px; }
                                .club-info { font-weight: 900; color: #006D34; font-size: 12px; margin-bottom: 20px; }
                                img { max-width: 100%; border-radius: 10px; margin: 20px 0; border: 1px solid #ddd; }
                                .meta { display: grid; grid-template-cols: 1fr 1fr; background: #f1f5f9; padding: 20px; border-radius: 10px; margin: 20px 0; gap: 10px; font-size: 13px; }
                                h3 { color: #006D34; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 30px; text-transform: uppercase; font-size: 16px; }
                                p { white-space: pre-wrap; }
                                .footer { margin-top: 50px; text-align: center; font-size: 10px; color: #94a3b8; font-weight: bold; border-top: 1px solid #eee; padding-top: 10px; }
                            </style>
                        </head>
                        <body>
                            <div class="club-info">SF WESTENFELD 1965 e.V.</div>
                            <h1>${ex.title}</h1>
                            ${ex.mediaType === 'image' ? `<img src="${ex.mediaUrl}"/>` : '<p><i>Video-Datei (Vorschau im PDF nicht möglich)</i></p>'}
                            <div class="meta">
                                <div><b>Block:</b> ${ex.trainingBlock}</div>
                                <div><b>Phase:</b> ${ex.gamePhase}</div>
                                <div><b>Spieler:</b> ${ex.players}</div>
                                <div><b>Dauer:</b> ${ex.duration}</div>
                                <div><b>Altersklassen:</b> ${ex.ageGroup.join(', ')}</div>
                                <div><b>Feld:</b> ${ex.fieldSizeTiefe}m (T) x ${ex.fieldSizeBreite}m (B)</div>
                            </div>
                            <h3>Beschreibung</h3><p>${ex.description}</p>
                            <h3>Ablauf</h3><p>${ex.procedure}</p>
                            <h3>Coaching-Punkte</h3><p>${ex.coachingPoints}</p>
                            <div style="display: grid; grid-template-cols: 1fr 1fr; gap: 20px;">
                                <div><h3>Erleichterung</h3><p>${ex.easier || '-'}</p></div>
                                <div><h3>Erschwerung</h3><p>${ex.harder || '-'}</p></div>
                            </div>
                            <div class="footer">GRÜN-WEISSE FAMILIE.</div>
                        </body>
                    </html>
                `);
                win.document.close();
                setTimeout(() => win.print(), 800);
            };

            const filtered = exercises.filter(ex => {
                return (filters.age === 'Alle' || ex.ageGroup.includes(filters.age)) &&
                       (filters.players === 'Alle' || ex.players === filters.players) &&
                       (filters.block === 'Alle' || ex.trainingBlock === filters.block) &&
                       (filters.phase === 'Alle' || ex.gamePhase === filters.phase) &&
                       (ex.title.toLowerCase().includes(searchTerm.toLowerCase()));
            });

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sfw-bg text-white p-6 shadow-xl sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="bg-white p-2 rounded-xl"><Icon name="shield" className="sfw-green" size={24} /></div>
                            <div>
                                <h1 className="text-3xl font-black italic tracking-tighter uppercase leading-none">TrainerKUMPEL</h1>
                                <p className="text-[10px] font-bold opacity-80 uppercase tracking-widest mt-1">Sportfreunde Westenfeld 1965 e.V.</p>
                            </div>
                        </div>
                        <button onClick={() => checkAuth('ADD')} className="bg-white text-[#006D34] px-6 py-3 rounded-2xl font-black uppercase text-xs hover:scale-105 active:scale-95 transition-all shadow-lg flex items-center gap-2">
                            <Icon name="plus" size={16} /> Neue Übung
                        </button>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-6 flex flex-col lg:flex-row gap-8 flex-1">
                        <aside className="lg:w-80 space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-6 sticky top-28">
                                <div className="relative">
                                    <input type="text" placeholder="Übung suchen..." className="w-full pl-10" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                    <Icon name="search" size={16} className="absolute left-3 top-3.5 text-slate-400" />
                                </div>
                                <div className="space-y-4">
                                    <div><label className="label-dark">Altersklasse</label>
                                        <select className="w-full" onChange={e => setFilters({...filters, age: e.target.value})}><option>Alle</option>{AGE_GROUPS.map(a => <option key={a}>{a}</option>)}</select>
                                    </div>
                                    <div><label className="label-dark">Spieleranzahl</label>
                                        <select className="w-full" onChange={e => setFilters({...filters, players: e.target.value})}><option>Alle</option>{PLAYER_COUNTS.map(a => <option key={a}>{a}</option>)}</select>
                                    </div>
                                    <div><label className="label-dark">Baustein</label>
                                        <select className="w-full" onChange={e => setFilters({...filters, block: e.target.value})}><option>Alle</option>{TRAINING_BLOCKS.map(a => <option key={a}>{a}</option>)}</select>
                                    </div>
                                    <div><label className="label-dark">Spielphase</label>
                                        <select className="w-full" onChange={e => setFilters({...filters, phase: e.target.value})}><option>Alle</option>{GAME_PHASES.map(a => <option key={a}>{a}</option>)}</select>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        <section className="flex-1 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 auto-rows-max">
                            {filtered.map(ex => (
                                <div key={ex.id} onClick={() => setSelectedExercise(ex)} className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all cursor-pointer group flex flex-col">
                                    <div className="h-44 bg-slate-100 relative">
                                        {ex.mediaType === 'video' ? (
                                            <div className="w-full h-full flex items-center justify-center bg-slate-200"><Icon name="play-circle" size={48} className="text-slate-400" /></div>
                                        ) : (
                                            <img src={ex.mediaUrl} className="w-full h-full object-cover transition-transform group-hover:scale-105" />
                                        )}
                                        <span className="absolute top-4 left-4 sfw-bg text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-md">{ex.trainingBlock.split(' ')[0]}</span>
                                    </div>
                                    <div className="p-6 flex-1 flex flex-col">
                                        <h3 className="font-black text-slate-800 uppercase leading-tight group-hover:text-[#006D34] transition-colors line-clamp-2">{ex.title}</h3>
                                        <div className="mt-auto pt-4 flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                            <span className="flex items-center gap-1"><Icon name="users" size={12}/> {ex.players}</span>
                                            <span className="flex items-center gap-1"><Icon name="clock" size={12}/> {ex.duration}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {filtered.length === 0 && (
                                <div className="col-span-full py-20 text-center space-y-4">
                                    <Icon name="search-x" size={48} className="mx-auto text-slate-300" />
                                    <p className="font-black text-slate-400 uppercase">Keine Übungen für diese Filter gefunden.</p>
                                </div>
                            )}
                        </section>
                    </main>

                    {/* Exercise View Modal */}
                    {selectedExercise && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] w-full max-w-5xl max-h-[90vh] overflow-hidden flex flex-col md:flex-row shadow-2xl modal-anim">
                                <div className="md:w-1/2 bg-black flex items-center justify-center p-4 overflow-hidden">
                                    {selectedExercise.mediaType === 'video' ? (
                                        <video src={selectedExercise.mediaUrl} controls className="max-w-full max-h-full rounded-xl" />
                                    ) : (
                                        <img src={selectedExercise.mediaUrl} className="max-w-full max-h-full rounded-xl shadow-2xl object-contain" />
                                    )}
                                </div>
                                <div className="md:w-1/2 p-10 overflow-y-auto space-y-8 flex flex-col">
                                    <div className="flex justify-between items-start shrink-0">
                                        <h2 className="text-4xl font-black sfw-green uppercase leading-none tracking-tighter">{selectedExercise.title}</h2>
                                        <button onClick={() => setSelectedExercise(null)} className="text-3xl font-bold bg-slate-100 hover:bg-slate-200 w-10 h-10 rounded-full flex items-center justify-center transition-all">×</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-[10px] font-black uppercase tracking-widest text-slate-500">
                                        <div className="bg-slate-50 p-4 rounded-2xl">Baustein: <br/><span className="text-slate-900 text-xs">{selectedExercise.trainingBlock}</span></div>
                                        <div className="bg-slate-50 p-4 rounded-2xl">Phase: <br/><span className="text-slate-900 text-xs">{selectedExercise.gamePhase}</span></div>
                                        <div className="bg-slate-50 p-4 rounded-2xl">Spieler: <br/><span className="text-slate-900 text-xs">{selectedExercise.players}</span></div>
                                        <div className="bg-slate-50 p-4 rounded-2xl">Feld: <br/><span className="text-slate-900 text-xs">{selectedExercise.fieldSizeTiefe}m x {selectedExercise.fieldSizeBreite}m</span></div>
                                    </div>
                                    <div className="space-y-4">
                                        <h4 className="label-dark sfw-green">Beschreibung</h4>
                                        <p className="text-sm font-bold text-slate-600 leading-relaxed italic">{selectedExercise.description}</p>
                                    </div>
                                    <div className="space-y-4">
                                        <h4 className="label-dark sfw-green">Ablauf</h4>
                                        <p className="text-sm font-bold text-slate-700 leading-relaxed whitespace-pre-wrap">{selectedExercise.procedure}</p>
                                    </div>
                                    <div className="space-y-4">
                                        <h4 className="label-dark sfw-green">Coaching-Punkte</h4>
                                        <p className="text-sm font-bold text-slate-700 leading-relaxed whitespace-pre-wrap">{selectedExercise.coachingPoints}</p>
                                    </div>
                                    {selectedExercise.videoLink && (
                                        <div className="pt-4 border-t border-slate-100 flex gap-4">
                                            <a href={selectedExercise.videoLink} target="_blank" className="flex items-center gap-2 text-xs font-black uppercase sfw-green hover:underline">
                                                <Icon name="link" size={14}/> Externer Video-Link
                                            </a>
                                        </div>
                                    )}
                                    <div className="mt-auto flex gap-4 pt-8 shrink-0">
                                        <button onClick={() => checkAuth('PDF', selectedExercise)} className="flex-1 btn-primary py-4 rounded-2xl uppercase text-xs shadow-xl flex items-center justify-center gap-2">
                                            <Icon name="file-down" size={16}/> PDF Export
                                        </button>
                                        <button onClick={() => checkAuth('DELETE', selectedExercise)} className="px-6 py-4 rounded-2xl border-2 border-red-100 text-red-500 font-black text-xs hover:bg-red-50 transition-colors">
                                            <Icon name="trash-2" size={16}/>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Upload Form Modal */}
                    {isFormOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 overflow-y-auto">
                            <form onSubmit={saveExercise} className="bg-white rounded-[3.5rem] w-full max-w-5xl p-10 md:p-14 space-y-8 my-auto modal-anim relative">
                                <button type="button" onClick={() => setIsFormOpen(false)} className="absolute top-10 right-10 text-3xl font-bold">×</button>
                                <h2 className="text-4xl font-black uppercase italic sfw-green border-b-4 border-slate-50 pb-4 leading-none">Übung hochladen</h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="space-y-6">
                                        <div>
                                            <label className="label-dark">Titel der Übung *</label>
                                            <input required type="text" className="w-full" value={formState.title} onChange={e => setFormState({...formState, title: e.target.value})} />
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="label-dark">Baustein *</label>
                                                <select className="w-full" value={formState.trainingBlock} onChange={e => setFormState({...formState, trainingBlock: e.target.value})}>{TRAINING_BLOCKS.map(b => <option key={b}>{b}</option>)}</select>
                                            </div>
                                            <div><label className="label-dark">Phase *</label>
                                                <select className="w-full" value={formState.gamePhase} onChange={e => setFormState({...formState, gamePhase: e.target.value})}>{GAME_PHASES.map(b => <option key={b}>{b}</option>)}</select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="label-dark">Altersklassen (Mehrfachnennung) *</label>
                                            <div className="grid grid-cols-4 gap-2">
                                                {AGE_GROUPS.map(age => (
                                                    <button type="button" key={age} onClick={() => setFormState(p => ({...p, ageGroup: p.ageGroup.includes(age) ? p.ageGroup.filter(a=>a!==age) : [...p.ageGroup, age]}))} className={`text-[9px] font-black p-2.5 rounded-xl border-2 transition-all ${formState.ageGroup.includes(age) ? 'sfw-bg text-white border-[#006D34]' : 'bg-white border-slate-100'}`}>{age}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="label-dark">Spieleranzahl *</label>
                                                <select className="w-full" value={formState.players} onChange={e => setFormState({...formState, players: e.target.value})}>{PLAYER_COUNTS.map(b => <option key={b}>{b}</option>)}</select>
                                            </div>
                                            <div><label className="label-dark">Dauer *</label>
                                                <input required type="text" placeholder="z.B. 20 min" className="w-full" value={formState.duration} onChange={e => setFormState({...formState, duration: e.target.value})} />
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="label-dark">Tiefe (1-105m) *</label>
                                                <input required type="number" min="1" max="105" className="w-full" value={formState.fieldSizeTiefe} onChange={e => setFormState({...formState, fieldSizeTiefe: e.target.value})} />
                                            </div>
                                            <div><label className="label-dark">Breite (1-68m) *</label>
                                                <input required type="number" min="1" max="68" className="w-full" value={formState.fieldSizeBreite} onChange={e => setFormState({...formState, fieldSizeBreite: e.target.value})} />
                                            </div>
                                        </div>

                                        <div className="pt-4">
                                            <label className="label-dark">Grafik oder Video hochladen *</label>
                                            <div className="border-4 border-dashed rounded-[2rem] p-10 text-center bg-slate-50 hover:border-emerald-500 cursor-pointer transition-colors relative">
                                                <input type="file" className="hidden" id="file" onChange={handleFileUpload} accept="image/*,video/*" />
                                                <label htmlFor="file" className="cursor-pointer font-black uppercase text-xs flex flex-col items-center gap-3">
                                                    <Icon name="upload-cloud" size={32} className="sfw-green" />
                                                    {formState.mediaUrl ? <span className="sfw-green">Datei erfolgreich ausgewählt!</span> : <span>Klicken zum Auswählen</span>}
                                                    <span className="text-[9px] opacity-50">Max. 800 KB</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div><label className="label-dark">Kurzbeschreibung *</label>
                                            <textarea required className="w-full h-20" value={formState.description} onChange={e => setFormState({...formState, description: e.target.value})} />
                                        </div>
                                        <div><label className="label-dark">Ablauf & Durchführung *</label>
                                            <textarea required className="w-full h-32" value={formState.procedure} onChange={e => setFormState({...formState, procedure: e.target.value})} />
                                        </div>
                                        <div><label className="label-dark">Coaching-Punkte *</label>
                                            <textarea required className="w-full h-20" value={formState.coachingPoints} onChange={e => setFormState({...formState, coachingPoints: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="label-dark">Erleichterung *</label>
                                                <textarea required className="w-full h-16" value={formState.easier} onChange={e => setFormState({...formState, easier: e.target.value})} />
                                            </div>
                                            <div><label className="label-dark">Erschwerung *</label>
                                                <textarea required className="w-full h-16" value={formState.harder} onChange={e => setFormState({...formState, harder: e.target.value})} />
                                            </div>
                                        </div>
                                        <div><label className="label-dark">Video-Link (YouTube/Instagram)</label>
                                            <input type="url" placeholder="https://..." className="w-full" value={formState.videoLink} onChange={e => setFormState({...formState, videoLink: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex gap-6 pt-6">
                                    <button type="button" onClick={() => setIsFormOpen(false)} className="flex-1 p-5 rounded-2xl font-black uppercase text-xs bg-slate-100 hover:bg-slate-200 transition-colors">Abbrechen</button>
                                    <button type="submit" disabled={isSaving} className="flex-1 btn-primary p-5 rounded-2xl uppercase text-xs shadow-xl flex items-center justify-center gap-3">
                                        {isSaving ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> Übertragung...</> : 'In Cloud speichern'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Auth Modal */}
                    {showAuthModal && (
                        <div className="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-4">
                            <div className="bg-white p-12 rounded-[3.5rem] w-full max-w-sm text-center space-y-8 shadow-2xl modal-anim">
                                <div className="bg-emerald-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto"><Icon name="lock" size={32} className="sfw-green" /></div>
                                <h3 className="text-2xl font-black uppercase sfw-green tracking-tighter italic leading-none">Trainer-Login</h3>
                                <form onSubmit={handleAuth} className="space-y-6">
                                    <input type="password" placeholder="Passwort..." className="w-full text-center text-4xl font-black tracking-[0.2em]" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} autoFocus />
                                    <button type="submit" className="w-full btn-primary py-5 rounded-2xl uppercase font-black text-xs shadow-2xl hover:scale-105 active:scale-95 transition-transform">Bestätigen</button>
                                </form>
                                <button onClick={() => setShowAuthModal(false)} className="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-slate-600">Abbrechen</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
