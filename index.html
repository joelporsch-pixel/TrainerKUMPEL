<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainerKUMPEL - SF Westenfeld</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .sfw-green { color: #006D34; }
        .sfw-bg { background-color: #006D34 !important; }
        .modal-anim { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        #loader-overlay {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .spinner { border: 4px solid #e2e8f0; border-top: 4px solid #006D34; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        input, select, textarea { 
            color: #0f172a !important; font-weight: 700 !important; background-color: #ffffff !important; 
            border: 2px solid #cbd5e1 !important; padding: 0.8rem !important; border-radius: 0.75rem !important; width: 100%;
        }
        .label-dark { color: #1e293b !important; font-weight: 800 !important; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.4rem; display: block; }
        .btn-save { background-color: #006D34 !important; color: white !important; font-weight: 900 !important; padding: 1.25rem 3rem; border-radius: 1.5rem; text-transform: uppercase; box-shadow: 0 10px 15px -3px rgba(0, 109, 52, 0.3); transition: all 0.2s; }
        .btn-save:hover { background-color: #005227 !important; transform: translateY(-2px); }
        .btn-save:disabled { background-color: #94a3b8 !important; transform: none; box-shadow: none; cursor: not-allowed; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #006D34; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-status" style="margin-top:24px; font-weight:900; color:#006D34; text-transform:uppercase; letter-spacing:1px; text-align:center; max-width: 450px; padding: 0 20px;">
            SFW TRAINER-CLOUD LÄDT...
        </p>
    </div>
    
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyCyeBZWO12eswCR9lYFJR07cm4ljIrhkqY",
            authDomain: "trainerkumpel.firebaseapp.com",
            projectId: "trainerkumpel",
            storageBucket: "trainerkumpel.firebasestorage.app",
            messagingSenderId: "274423185184",
            appId: "1:274423185184:web:7a65942694ff8d98c5a145"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "sfw_titan_v17_ultimate";

        const ADMIN_PASSWORD = 'SF_Westenfeld1965!';
        const AGE_GROUPS = ['G-Jugend', 'F-Jugend', 'E-Jugend', 'D-Jugend', 'C-Jugend', 'B-Jugend', 'A-Jugend', 'Herren'];
        const PLAYER_COUNTS = ['1-4 Spieler', '5-8 Spieler', '9-12 Spieler', '13-17 Spieler', '18-22 Spieler'];
        const TRAINING_BLOCKS = ['A - Aufwärmen', 'I - Individuell', 'K - Kollektiv', 'LD - Letztes Drittel', 'S - Spiel'];
        const GAME_PHASES = ['Offensiv (Angreifen)', 'Defensiv (Verteidigen)'];

        const iconMap = {
            'shield': 'fa-solid fa-shield-halved', 'plus': 'fa-solid fa-plus', 'search': 'fa-solid fa-magnifying-glass',
            'play-circle': 'fa-regular fa-circle-play', 'users': 'fa-solid fa-users', 'clock': 'fa-regular fa-clock',
            'maximize': 'fa-solid fa-expand', 'target': 'fa-solid fa-bullseye', 'list': 'fa-solid fa-list',
            'check-circle': 'fa-regular fa-circle-check', 'download': 'fa-solid fa-download', 'trash-2': 'fa-regular fa-trash-can',
            'upload-cloud': 'fa-solid fa-cloud-arrow-up', 'save': 'fa-solid fa-floppy-disk', 'lock': 'fa-solid fa-lock',
            'fingerprint': 'fa-solid fa-fingerprint', 'alert-triangle': 'fa-solid fa-triangle-exclamation',
            'youtube': 'fa-brands fa-youtube', 'instagram': 'fa-brands fa-instagram', 'link': 'fa-solid fa-link'
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const faClass = iconMap[name] || 'fa-solid fa-circle';
            return <i className={`${faClass} ${className}`} style={{ fontSize: size }}></i>;
        };

        function App() {
            const [user, setUser] = React.useState(null);
            const [exercises, setExercises] = React.useState([]);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [filters, setFilters] = React.useState({ age: 'Alle', players: 'Alle', block: 'Alle', phase: 'Alle' });
            
            const [selectedExercise, setSelectedExercise] = React.useState(null);
            const [isFormOpen, setIsFormOpen] = React.useState(false);
            const [isAuthenticated, setIsAuthenticated] = React.useState(false);
            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [passwordInput, setPasswordInput] = React.useState('');
            const [pendingAction, setPendingAction] = React.useState(null);
            const [isSaving, setIsSaving] = React.useState(false);
            const [errorMessage, setErrorMessage] = React.useState('');

            const [formState, setFormState] = React.useState({ 
                title: '', trainingBlock: TRAINING_BLOCKS[0], gamePhase: GAME_PHASES[0], ageGroup: [], 
                players: PLAYER_COUNTS[0], duration: '', fieldSizeTiefe: '', fieldSizeBreite: '', 
                description: '', procedure: '', coachingPoints: '', easier: '', harder: '', 
                mediaUrl: '', mediaType: 'image', youtubeLink: '', instagramLink: '' 
            });

            React.useEffect(() => {
                const loaderOverlay = document.getElementById('loader-overlay');
                const fallbackTimer = setTimeout(() => { if (loaderOverlay) loaderOverlay.style.display = 'none'; }, 4000);

                const initSession = async () => {
                    try { await auth.signInAnonymously(); } catch (e) { console.error(e); }
                };
                initSession();

                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exercises');
                        const stopSync = ref.onSnapshot(snap => {
                            const data = snap.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                            setExercises(data.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)));
                            if (loaderOverlay) loaderOverlay.style.display = 'none';
                            clearTimeout(fallbackTimer);
                        }, err => {
                            if (loaderOverlay) loaderOverlay.style.display = 'none';
                        });
                        return () => stopSync();
                    }
                });
                return () => { unsubscribe(); clearTimeout(fallbackTimer); };
            }, []);

            const checkAuth = (action, data = null) => {
                if (isAuthenticated) executeAction(action, data);
                else { setPendingAction({ type: action, data }); setShowAuthModal(true); }
            };

            const executeAction = (type, data) => {
                if (type === 'ADD') setIsFormOpen(true);
                if (type === 'PDF') performExport(data);
                if (type === 'DELETE') handleDelete(data);
            };

            const handleAuthSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAuthenticated(true);
                    setShowAuthModal(false);
                    executeAction(pendingAction.type, pendingAction.data);
                    setPasswordInput('');
                } else { alert("Passwort falsch!"); }
            };

            const handleDelete = async (ex) => {
                if (confirm(`Übung "${ex.title}" löschen?`)) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exercises').doc(ex.id).delete();
                    setSelectedExercise(null);
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file || file.size > 500 * 1024) return alert("Datei zu groß (Max 500KB)");
                const reader = new FileReader();
                reader.onloadend = () => setFormState(p => ({ ...p, mediaUrl: reader.result, mediaType: file.type.startsWith('video/') ? 'video' : 'image' }));
                reader.readAsDataURL(file);
            };

            const saveExercise = async (e) => {
                if (e) e.preventDefault();
                if (isSaving) return;
                setErrorMessage('');
                if (!user || formState.ageGroup.length === 0 || !formState.mediaUrl || !formState.title) {
                    setErrorMessage("Bitte alle Pflichtfelder (*) ausfüllen.");
                    return;
                }
                setIsSaving(true);
                try {
                    const dataToSave = { 
                        ...formState, 
                        fieldSize: `${formState.fieldSizeTiefe || 0}m x ${formState.fieldSizeBreite || 0}m`,
                        createdAt: Date.now() 
                    };
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exercises').add(dataToSave);
                    setIsSaving(false);
                    setIsFormOpen(false);
                    setFormState({ title: '', trainingBlock: TRAINING_BLOCKS[0], gamePhase: GAME_PHASES[0], ageGroup: [], players: PLAYER_COUNTS[0], duration: '', fieldSizeTiefe: '', fieldSizeBreite: '', description: '', procedure: '', coachingPoints: '', easier: '', harder: '', mediaUrl: '', mediaType: 'image', youtubeLink: '', instagramLink: '' });
                } catch (err) {
                    setErrorMessage("Fehler beim Speichern.");
                    setIsSaving(false);
                }
            };

            const performExport = (ex) => {
                const win = window.open('', '', 'width=900,height=1000');
                win.document.write(`<html><head><title>SFW Export</title><style>body{font-family:sans-serif;padding:40px;color:#0f172a;}h1{color:#006D34;text-transform:uppercase;border-bottom:5px solid #006D34;} .meta{display:grid;grid-template-cols:1fr 1fr;background:#f1f5f9;padding:20px;border-radius:15px;margin:20px 0; gap:10px; font-size:13px;}</style></head><body><div style="font-weight:900; color:#006D34;">SF WESTENFELD 1965 e.V.</div><h1>${ex.title}</h1><img src="${ex.mediaUrl}" style="max-width:100%; border-radius:10px; border:1px solid #ddd;"/><div class="meta"><div><b>Block:</b> ${ex.trainingBlock}</div><div><b>Phase:</b> ${ex.gamePhase}</div><div><b>Spieler:</b> ${ex.players}</div><div><b>Dauer:</b> ${ex.duration}</div><div><b>Feld:</b> ${ex.fieldSize}</div></div><h3>Ablauf</h3><p style="white-space:pre-wrap;">${ex.procedure}</p><h3>Coaching</h3><p style="white-space:pre-wrap;">${ex.coachingPoints}</p><div style="display:grid; grid-template-cols:1fr 1fr; gap:20px;"><div style="background:#f0fdf4; padding:15px; border-radius:10px;"><b>Erleichterung:</b><br/>${ex.easier || '-'}</div><div style="background:#fef2f2; padding:15px; border-radius:10px;"><b>Erschwerung:</b><br/>${ex.harder || '-'}</div></div></body></html>`);
                win.document.close();
                setTimeout(() => win.print(), 800);
            };

            const filtered = exercises.filter(ex => {
                const ageMatch = filters.age === 'Alle' || (ex.ageGroup && ex.ageGroup.includes(filters.age));
                const playerMatch = filters.players === 'Alle' || ex.players === filters.players;
                const blockMatch = filters.block === 'Alle' || ex.trainingBlock === filters.block;
                const phaseMatch = filters.phase === 'Alle' || ex.gamePhase === filters.phase;
                const searchMatch = (ex.title || '').toLowerCase().includes(searchTerm.toLowerCase());
                return ageMatch && playerMatch && blockMatch && phaseMatch && searchMatch;
            });

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sfw-bg text-white p-5 shadow-2xl flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <Icon name="shield" className="bg-white p-2 rounded-2xl sfw-green" size={24} />
                            <div>
                                <h1 className="text-2xl font-black italic uppercase leading-none tracking-tighter">TrainerKUMPEL</h1>
                                <p className="text-[10px] font-bold opacity-80 uppercase tracking-widest mt-1">SF Westenfeld 1965 e.V.</p>
                            </div>
                        </div>
                        <button onClick={() => checkAuth('ADD')} className="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl font-black uppercase text-xs border border-white/20 transition-all flex items-center gap-2">
                            <Icon name="plus" size={16}/> Neue Übung
                        </button>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-6 flex flex-col lg:flex-row gap-8 flex-1">
                        <aside className="lg:w-80 shrink-0">
                            <div className="bg-white p-7 rounded-[3rem] shadow-sm border border-slate-200 space-y-7 sticky top-28">
                                <div className="relative">
                                    <input type="text" placeholder="Suche..." className="w-full pl-11 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                    <Icon name="search" size={18} className="absolute left-4 top-4 text-slate-400" />
                                </div>
                                <div className="space-y-5">
                                    <div><label className="label-dark font-bold">Altersklasse</label><select onChange={e => setFilters({...filters, age: e.target.value})} className="font-bold cursor-pointer"><option>Alle</option>{AGE_GROUPS.map(a => <option key={a}>{a}</option>)}</select></div>
                                    <div><label className="label-dark font-bold">Spieleranzahl</label><select onChange={e => setFilters({...filters, players: e.target.value})} className="font-bold cursor-pointer"><option>Alle</option>{PLAYER_COUNTS.map(a => <option key={a}>{a}</option>)}</select></div>
                                    <div><label className="label-dark font-bold">Baustein</label><select onChange={e => setFilters({...filters, block: e.target.value})} className="font-bold cursor-pointer"><option>Alle</option>{TRAINING_BLOCKS.map(a => <option key={a}>{a}</option>)}</select></div>
                                    <div><label className="label-dark font-bold">Spielphase</label><select onChange={e => setFilters({...filters, phase: e.target.value})} className="font-bold cursor-pointer"><option>Alle</option>{GAME_PHASES.map(a => <option key={a}>{a}</option>)}</select></div>
                                </div>
                            </div>
                        </aside>

                        <section className="flex-1 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 auto-rows-max">
                            {filtered.map(ex => (
                                <div key={ex.id} onClick={() => setSelectedExercise(ex)} className="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm hover:shadow-2xl transition-all cursor-pointer group flex flex-col">
                                    <div className="h-52 bg-slate-100 relative overflow-hidden">
                                        {ex.mediaType === 'video' ? <div className="w-full h-full flex items-center justify-center bg-slate-200"><Icon name="play-circle" size={48} className="text-slate-400" /></div> : <img src={ex.mediaUrl} className="w-full h-full object-cover group-hover:scale-110 transition-transform" />}
                                        <div className="absolute top-4 left-4"><span className="sfw-bg text-white text-[10px] font-black px-4 py-2 rounded-full uppercase shadow-xl">{ex.trainingBlock?.split(' ')[0]}</span></div>
                                    </div>
                                    <div className="p-7 flex-1 flex flex-col">
                                        <h3 className="font-black text-slate-800 uppercase text-lg mb-4 line-clamp-2">{ex.title}</h3>
                                        <div className="mt-auto pt-4 border-t border-slate-50 flex justify-between text-[11px] font-bold text-slate-400 uppercase font-bold">
                                            <span><Icon name="users" size={12}/> {ex.players?.split(' ')[0]}</span>
                                            <span><Icon name="clock" size={12}/> {ex.duration}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {filtered.length === 0 && <div className="col-span-full py-24 text-center text-slate-300 font-black uppercase italic tracking-widest">Keine Übungen gefunden</div>}
                        </section>
                    </main>

                    {/* DETAIL VIEW */}
                    {selectedExercise && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-[4rem] w-full max-w-6xl max-h-[95vh] overflow-hidden flex flex-col md:flex-row shadow-2xl modal-anim border-2 border-slate-100">
                                <div className="md:w-1/2 bg-black flex items-center justify-center p-4 relative">
                                    {selectedExercise.mediaType === 'video' ? <video src={selectedExercise.mediaUrl} controls className="max-w-full max-h-full rounded-3xl" /> : <img src={selectedExercise.mediaUrl} className="max-w-full max-h-full rounded-3xl shadow-2xl object-contain" />}
                                </div>
                                <div className="md:w-1/2 p-10 sm:p-14 overflow-y-auto space-y-10">
                                    <div className="flex justify-between items-start border-b-4 border-emerald-50 pb-8">
                                        <div>
                                            <div className="flex gap-4 mb-4 font-bold">
                                                <span className="sfw-bg text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">{selectedExercise.trainingBlock}</span>
                                                <span className="bg-emerald-50 text-emerald-700 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">{selectedExercise.ageGroup?.join(', ')}</span>
                                            </div>
                                            <h2 className="text-4xl font-black sfw-green uppercase leading-none tracking-tighter">{selectedExercise.title}</h2>
                                        </div>
                                        <button onClick={() => setSelectedExercise(null)} className="text-4xl font-black bg-slate-50 w-14 h-14 rounded-full flex items-center justify-center">×</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6 text-[11px] font-bold uppercase tracking-widest text-slate-500 font-bold">
                                        <div className="bg-slate-50 p-6 rounded-[2rem] shadow-sm"><Icon name="maximize" className="sfw-green mb-2" /><br/>Feld: <span className="text-slate-900 block mt-1">{selectedExercise.fieldSize}</span></div>
                                        <div className="bg-slate-50 p-6 rounded-[2rem] shadow-sm"><Icon name="users" className="sfw-green mb-2" /><br/>Spieler: <span className="text-slate-900 block mt-1">{selectedExercise.players}</span></div>
                                        <div className="bg-slate-50 p-6 rounded-[2rem] shadow-sm"><Icon name="clock" className="sfw-green mb-2" /><br/>Dauer: <span className="text-slate-900 block mt-1">{selectedExercise.duration}</span></div>
                                        <div className="bg-slate-50 p-6 rounded-[2rem] shadow-sm"><Icon name="shield" className="sfw-green mb-2" /><br/>Phase: <span className="text-slate-900 block mt-1">{selectedExercise.gamePhase}</span></div>
                                    </div>
                                    <div className="space-y-6">
                                        <div><h4 className="label-dark sfw-green font-bold">Durchführung</h4><p className="text-sm font-bold text-slate-700 leading-relaxed whitespace-pre-wrap">{selectedExercise.procedure}</p></div>
                                        <div><h4 className="label-dark sfw-green font-bold">Coaching-Punkte</h4><p className="text-sm font-bold text-slate-700 leading-relaxed whitespace-pre-wrap">{selectedExercise.coachingPoints}</p></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-emerald-50 p-6 rounded-3xl border-l-8 border-emerald-600"><h5 className="label-dark sfw-green">Erleichterung</h5><p className="text-xs font-bold text-emerald-900">{selectedExercise.easier || '-'}</p></div>
                                            <div className="bg-red-50 p-6 rounded-3xl border-l-8 border-red-600"><h5 className="label-dark text-red-600">Erschwerung</h5><p className="text-xs font-bold text-red-900">{selectedExercise.harder || '-'}</p></div>
                                        </div>
                                    </div>
                                    
                                    {/* SOCIAL LINKS DISPLAY */}
                                    {(selectedExercise.youtubeLink || selectedExercise.instagramLink) && (
                                        <div className="flex gap-4 pt-4">
                                            {selectedExercise.youtubeLink && (
                                                <a href={selectedExercise.youtubeLink} target="_blank" rel="noreferrer" className="flex items-center gap-2 bg-red-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg hover:scale-105 transition-all">
                                                    <Icon name="youtube" size={14}/> YouTube
                                                </a>
                                            )}
                                            {selectedExercise.instagramLink && (
                                                <a href={selectedExercise.instagramLink} target="_blank" rel="noreferrer" className="flex items-center gap-2 bg-gradient-to-tr from-yellow-400 to-purple-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg hover:scale-105 transition-all">
                                                    <Icon name="instagram" size={14}/> Instagram
                                                </a>
                                            )}
                                        </div>
                                    )}

                                    <div className="flex gap-4 pt-10">
                                        <button onClick={() => checkAuth('PDF', selectedExercise)} className="flex-1 sfw-bg text-white py-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl flex items-center justify-center gap-3"><Icon name="download" size={18}/> PDF Export</button>
                                        <button onClick={() => checkAuth('DELETE', selectedExercise)} className="px-10 py-5 rounded-[2.5rem] border-4 border-red-50 text-red-500 font-black text-xs hover:bg-red-50 transition-all flex items-center gap-3"><Icon name="trash-2" size={18}/> Löschen</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* UPLOAD FORM */}
                    {isFormOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/95 flex items-center justify-center p-4 overflow-y-auto">
                            <form onSubmit={saveExercise} className="bg-white rounded-[4.5rem] w-full max-w-6xl p-10 md:p-14 space-y-8 my-auto modal-anim relative border-4 border-slate-100 shadow-2xl">
                                <button type="button" onClick={() => setIsFormOpen(false)} className="absolute top-12 right-12 text-4xl font-black text-slate-300 transition-all">×</button>
                                <h2 className="text-4xl font-black uppercase italic sfw-green border-b-8 border-emerald-50 pb-8 leading-none">Übung hochladen</h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    <div className="space-y-6">
                                        <div><label className="label-dark font-bold">Titel der Übung *</label><input required type="text" value={formState.title} onChange={e => setFormState({...formState, title: e.target.value})} className="font-bold" /></div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div><label className="label-dark font-bold">Baustein *</label><select value={formState.trainingBlock} onChange={e => setFormState({...formState, trainingBlock: e.target.value})}>{TRAINING_BLOCKS.map(b => <option key={b}>{b}</option>)}</select></div>
                                            <div><label className="label-dark font-bold">Phase *</label><select value={formState.gamePhase} onChange={e => setFormState({...formState, gamePhase: e.target.value})}>{GAME_PHASES.map(p => <option key={p}>{p}</option>)}</select></div>
                                        </div>
                                        <div><label className="label-dark font-bold">Altersklasse(n) *</label>
                                            <div className="grid grid-cols-4 gap-2">
                                                {AGE_GROUPS.map(age => (
                                                    <button type="button" key={age} onClick={() => setFormState(p => ({...p, ageGroup: p.ageGroup.includes(age) ? p.ageGroup.filter(a=>a!==age) : [...p.ageGroup, age]}))} 
                                                            className={`text-[10px] font-black p-3 rounded-xl border-2 transition-all uppercase ${formState.ageGroup.includes(age) ? 'sfw-bg text-white border-emerald-800' : 'bg-white border-slate-100'}`}>{age}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div><label className="label-dark font-bold">Spieler *</label><select value={formState.players} onChange={e => setFormState({...formState, players: e.target.value})}>{PLAYER_COUNTS.map(c => <option key={c}>{c}</option>)}</select></div>
                                            <div><label className="label-dark font-bold">Dauer *</label><input required type="text" placeholder="20 min" value={formState.duration} onChange={e => setFormState({...formState, duration: e.target.value})} /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div><label className="label-dark font-bold">Tiefe (T) *</label><input required type="number" value={formState.fieldSizeTiefe} onChange={e => setFormState({...formState, fieldSizeTiefe: e.target.value})} /></div>
                                            <div><label className="label-dark font-bold">Breite (B) *</label><input required type="number" value={formState.fieldSizeBreite} onChange={e => setFormState({...formState, fieldSizeBreite: e.target.value})} /></div>
                                        </div>
                                        
                                        {/* SOCIAL LINKS EINGABE */}
                                        <div className="grid grid-cols-2 gap-6">
                                            <div><label className="label-dark font-bold">YouTube Link</label><input type="url" placeholder="https://youtube.com/..." value={formState.youtubeLink} onChange={e => setFormState({...formState, youtubeLink: e.target.value})} /></div>
                                            <div><label className="label-dark font-bold">Instagram Link</label><input type="url" placeholder="https://instagram.com/..." value={formState.instagramLink} onChange={e => setFormState({...formState, instagramLink: e.target.value})} /></div>
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="bg-emerald-50 p-10 rounded-[2.5rem] border-4 border-dashed border-emerald-100 text-center relative shadow-inner group">
                                            <input type="file" className="hidden" id="file" onChange={handleFileUpload} accept="image/*,video/*" />
                                            <label htmlFor="file" className="cursor-pointer font-black uppercase text-xs flex flex-col items-center gap-4">
                                                <Icon name="upload-cloud" size={48} className="sfw-green opacity-40 group-hover:opacity-100 transition-all" />
                                                <span className="sfw-green font-black text-lg block uppercase tracking-widest font-bold">Grafik / Video hochladen *</span>
                                                <span className="text-[11px] text-emerald-600 font-bold uppercase font-bold">Limit: 500 KB</span>
                                            </label>
                                            {formState.mediaUrl && <div className="mt-4 h-32 overflow-hidden rounded-2xl border-2 border-white"><img src={formState.mediaUrl} className="w-full h-full object-contain" /></div>}
                                        </div>
                                        <div><label className="label-dark font-bold">Ablauf & Durchführung *</label><textarea required className="h-28 font-bold" value={formState.procedure} onChange={e => setFormState({...formState, procedure: e.target.value})} /></div>
                                        <div><label className="label-dark font-bold">Coaching-Punkte *</label><textarea required className="h-20 font-bold" value={formState.coachingPoints} onChange={e => setFormState({...formState, coachingPoints: e.target.value})} /></div>
                                    </div>
                                </div>
                                
                                {/* DEDIZIERTER BEREICH FÜR ERLEICHTERUNG / ERSCHWERUNG */}
                                <div className="border-t-4 border-slate-50 pt-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-emerald-50/50 p-6 rounded-[2rem] border-2 border-emerald-100">
                                        <label className="label-dark font-bold text-emerald-700">Erleichtern (Wie geht es einfacher?)</label>
                                        <textarea className="h-24 bg-white border-emerald-100" value={formState.easier} onChange={e => setFormState({...formState, easier: e.target.value})} placeholder="z.B. Feld vergrößern, Joker einbauen..." />
                                    </div>
                                    <div className="bg-red-50/50 p-6 rounded-[2rem] border-2 border-red-100">
                                        <label className="label-dark font-bold text-red-700">Erschweren (Wie geht es schwerer?)</label>
                                        <textarea className="h-24 bg-white border-red-100" value={formState.harder} onChange={e => setFormState({...formState, harder: e.target.value})} placeholder="z.B. Ballkontakte limitieren, Zeitdruck..." />
                                    </div>
                                </div>

                                <div className="flex gap-8 pt-6 border-t-8 border-slate-50 items-center justify-between">
                                    {errorMessage && <p className="text-red-500 font-black text-xs uppercase animate-pulse">{errorMessage}</p>}
                                    <div className="flex gap-8 ml-auto">
                                        <button type="button" onClick={() => setIsFormOpen(false)} className="px-14 py-6 font-black uppercase text-xs text-slate-400">Abbrechen</button>
                                        <button type="submit" disabled={isSaving} className="btn-save flex items-center gap-4 text-sm tracking-widest">
                                            {isSaving ? <><div className="spinner w-6 h-6 border-4"></div> Speichere...</> : <><Icon name="save" size={20}/> In Cloud speichern</>}
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* AUTH MODAL */}
                    {showAuthModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-950/95 flex items-center justify-center p-4 backdrop-blur-lg">
                            <div className="bg-white p-16 rounded-[4rem] w-full max-w-sm text-center space-y-12 shadow-2xl modal-anim border-8 border-emerald-50 relative overflow-hidden">
                                <div className="bg-emerald-50 w-28 h-28 rounded-full flex items-center justify-center mx-auto shadow-inner"><Icon name="lock" size={48} className="sfw-green" /></div>
                                <h3 className="text-4xl font-black uppercase sfw-green tracking-tighter italic leading-none">Trainer-Login</h3>
                                <form onSubmit={handleAuthSubmit} className="space-y-8">
                                    <input type="password" placeholder="PASSWORT" className="w-full text-center text-5xl font-black tracking-[0.3em] bg-slate-50 border-8 border-transparent focus:border-sfw rounded-[2.5rem] py-8 transition-all" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} autoFocus />
                                    <button type="submit" className="w-full sfw-bg text-white py-8 rounded-[3rem] font-black uppercase shadow-2xl transition-all text-sm tracking-widest uppercase">Anmelden</button>
                                </form>
                                <button onClick={() => {setShowAuthModal(false); setPasswordInput('');}} className="text-[11px] font-black text-slate-300 uppercase tracking-widest">Abbrechen</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
